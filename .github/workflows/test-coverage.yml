name: Test Coverage and Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_strellerminds
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Run type checking
      run: npm run build

    - name: Run unit tests with coverage
      run: npm run test:cov
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_strellerminds
        REDIS_URL: redis://localhost:6379

    - name: Run integration tests
      run: npm run test:integration:cov
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_strellerminds
        REDIS_URL: redis://localhost:6379

    - name: Run E2E tests
      run: npm run test:e2e
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_strellerminds
        REDIS_URL: redis://localhost:6379

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true

    - name: Generate coverage report
      run: |
        npm run test:cov
        npm run test:integration:cov
        npx nyc merge coverage coverage/merged-coverage.json
        npx nyc report --reporter=text-summary --reporter=html --reporter=json

    - name: Coverage comment
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
          
          const total = coverage.total;
          const lines = `${total.lines.pct}%`;
          const functions = `${total.functions.pct}%`;
          const branches = `${total.branches.pct}%`;
          const statements = `${total.statements.pct}%`;
          
          const comment = `
          ## 📊 Test Coverage Report
          
          | Metric | Coverage |
          |--------|----------|
          | Lines | ${lines} |
          | Functions | ${functions} |
          | Branches | ${branches} |
          | Statements | ${statements} |
          
          **Overall Coverage: ${statements}**
          
          ${total.statements.pct >= 80 ? '✅ Coverage threshold met!' : '❌ Coverage below 80% threshold'}
          `;
          
          if (context.eventName === 'pull_request') {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

  security:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=moderate

    - name: Run security scan
      run: npm run security:scan

  performance:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Start application
      run: npm run start:prod &
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_strellerminds
        REDIS_URL: redis://localhost:6379

    - name: Wait for application
      run: sleep 30

    - name: Run performance tests
      run: npm run perf:load

    - name: Run stress tests
      run: npm run perf:stress

  quality-gate:
    runs-on: ubuntu-latest
    needs: [test, security, performance]
    if: always()

    steps:
    - name: Quality gate check
      run: |
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "❌ Tests failed"
          exit 1
        fi
        
        if [[ "${{ needs.security.result }}" != "success" ]]; then
          echo "❌ Security checks failed"
          exit 1
        fi
        
        if [[ "${{ needs.performance.result }}" != "success" ]]; then
          echo "⚠️ Performance tests failed"
          exit 1
        fi
        
        echo "✅ All quality checks passed!"
