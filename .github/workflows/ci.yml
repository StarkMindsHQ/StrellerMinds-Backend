  # Build and Deploy
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    needs: [code-quality, test, security-scan]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Build application
      run: npm run build
      
    - name: Build Docker image
      run: |
        docker build -t strellerminds-backend:${{ github.sha }} .
        docker tag strellerminds-backend:${{ github.sha }} strellerminds-backend:latest
        
    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Push to Docker Hub
      if: github.event_name != 'pull_request'
      run: |
        docker push strellerminds-backend:${{ github.sha }}
        docker push strellerminds-backend:latest
        
    - name: Deploy to production
      if: github.event_name != 'pull_request'
      run: |
        echo "Deployment step would go here"
        # Add your deployment logic here